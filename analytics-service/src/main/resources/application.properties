# ===================================================================
# ANALYTICS SERVICE CONFIGURATION
# ===================================================================

# ===================================================================
# Server Configuration
# ===================================================================
spring.application.name=analytics-service
server.port=8084
server.servlet.context-path=/

# ===================================================================
# Database Configuration - PostgreSQL
# ===================================================================
spring.datasource.url=${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/analytics_db}
spring.datasource.username=${ANALYTICS_DB_USERNAME:postgres}
spring.datasource.password=${ANALYTICS_DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===================================================================
# JPA / Hibernate Configuration
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===================================================================
# Flyway Database Migration
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# ===================================================================
# Redis Configuration
# ===================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# Redis Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# ===================================================================
# RabbitMQ Configuration
# ===================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Consumer Configuration
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2

# ===================================================================
# Service URLs (OpenFeign)
# ===================================================================
user-service.url=${USER_SERVICE_URL:http://localhost:8082}
auth-service.url=${AUTH_SERVICE_URL:http://localhost:8081}

# ===================================================================
# Internal API Security
# ===================================================================
internal.api.key=${INTERNAL_API_KEY:your-internal-api-key-change-in-production}

# ===================================================================
# JWT Configuration (for admin authentication)
# ===================================================================
jwt.secret=${JWT_SECRET:your-jwt-secret-key-at-least-512-bits-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600}

# ===================================================================
# Scheduling Configuration
# ===================================================================
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=analytics-scheduler-

# ===================================================================
# Jackson JSON Configuration
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ===================================================================
# Actuator Configuration
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ===================================================================
# Logging Configuration
# ===================================================================
logging.level.root=INFO
logging.level.iuh.fit.se.analyticsservice=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.amqp=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================================================
# CORS Configuration
# ===================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
